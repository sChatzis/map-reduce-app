services:
  user_db:
    image: postgres:15
    container_name: user_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${USER_DB_USER}
      POSTGRES_PASSWORD: ${USER_DB_PASSWORD}
      POSTGRES_DB: ${USER_DB_NAME}
    volumes:
      - user_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${USER_DB_USER} -d ${USER_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth_service:
    build: ./authentication_service
    container_name: auth_service
    ports:
      - "8000:8000"
    depends_on:
      user_db:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${USER_DB_USER}
      POSTGRES_PASSWORD: ${USER_DB_PASSWORD}
      POSTGRES_DB: ${USER_DB_NAME}
      POSTGRES_SERVER: user_db
      POSTGRES_PORT: 5432
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}

  jobs_db:
    image: postgres:15
    container_name: jobs_db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${JOBS_DB_USER}
      POSTGRES_PASSWORD: ${JOBS_DB_PASSWORD}
      POSTGRES_DB: ${JOBS_DB_NAME}
    volumes:
      - jobs_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${JOBS_DB_USER} -d ${JOBS_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer
    container_name: adminer
    restart: always
    ports:
      - "8081:8080"

  minio:
    # Pinned: minio/minio:latest segfaults on arm64 (Apple Silicon).
    image: minio/minio:RELEASE.2024-09-22T00-33-43Z
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  manager_service:
    build: ./manager_service
    container_name: manager_service
    ports:
      - "8001:8001"
    depends_on:
      jobs_db:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      JOBS_DB_USER: ${JOBS_DB_USER}
      JOBS_DB_PASSWORD: ${JOBS_DB_PASSWORD}
      JOBS_DB_NAME: ${JOBS_DB_NAME}
      POSTGRES_SERVER: jobs_db
      POSTGRES_PORT: 5432

      JWT_SECRET_KEY: ${JWT_SECRET_KEY}

      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}

      MANAGER_NAMESPACE: "mapreduce"
      MANAGER_WORKER_IMAGE_NAME: "map-reduce-app-manager_worker:latest"
      MANAGER_REFRESH_PERIOD: 10

  ui_service:
    build: ./ui_service
    container_name: ui_service
    depends_on:
      - auth_service
      - manager_service
    environment:
      BASE_URL: http://auth_service:8000/v1/users
      MANAGER_URL: http://manager_service:8001

volumes:
  user_postgres_data:
  jobs_postgres_data:
  minio_data:
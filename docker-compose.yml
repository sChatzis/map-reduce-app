services:
  user_db:
    image: postgres:15
    container_name: user_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${USER_DB_USER}
      POSTGRES_PASSWORD: ${USER_DB_PASSWORD}
      POSTGRES_DB: ${USER_DB_NAME}
    volumes:
      - user_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${USER_DB_USER} -d ${USER_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth_service:
    build: ./authentication_service
    container_name: auth_service
    ports:
      - "8000:8000"
    depends_on:
      user_db:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${USER_DB_USER}
      POSTGRES_PASSWORD: ${USER_DB_PASSWORD}
      POSTGRES_DB: ${USER_DB_NAME}
      POSTGRES_SERVER: user_db
      POSTGRES_PORT: 5432
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}

  jobs_db:
    image: postgres:15
    container_name: jobs_db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${JOBS_DB_USER}
      POSTGRES_PASSWORD: ${JOBS_DB_PASSWORD}
      POSTGRES_DB: ${JOBS_DB_NAME}
    volumes:
      - jobs_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${JOBS_DB_USER} -d ${JOBS_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  manager_service:
    build: ./manager_service
    container_name: manager_service
    ports:
      - "8001:8001"
    depends_on:
      jobs_db:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${JOBS_DB_USER}
      POSTGRES_PASSWORD: ${JOBS_DB_PASSWORD}
      POSTGRES_DB: ${JOBS_DB_NAME}
      POSTGRES_SERVER: jobs_db
      POSTGRES_PORT: 5432
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}

  ui_service:
    build: ./ui_service
    container_name: ui_service
    depends_on:
      - auth_service
      - manager_service
    environment:
      BASE_URL: http://auth_service:8000/v1/users
      MANAGER_URL: http://manager_service:8001

volumes:
  user_postgres_data:
  jobs_postgres_data:
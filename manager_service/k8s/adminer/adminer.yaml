apiVersion: apps/v1
kind: Deployment
metadata:
  name: adminer
  namespace: mapreduce
  labels:
    app: adminer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: adminer
  template:
    metadata:
      labels:
        app: adminer
    spec:
      containers:
        - name: adminer
          image: adminer:latest
          ports:
            - containerPort: 8080
          env:
            - name: ADMINER_DEFAULT_SERVER
              value: "-db.mapreduce.svc.cluster.local"
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 2
---
apiVersion: v1
kind: Service
metadata:
  name: adminer
  namespace: mapreduce
  labels:
    app: adminer
spec:
  type: NodePort
  selector:
    app: adminer
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30003
